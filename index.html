<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social X</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial,sans-serif;
}

.app{
max-width:1400px;
margin:auto;
display:grid;
grid-template-columns:260px 1fr 350px;
min-height:100vh;
}

.sidebar-left{
padding:20px;
border-right:1px solid #222;
}

.logo{
font-size:42px;
margin-bottom:30px;
}

.menu button{
width:100%;
padding:15px;
background:none;
border:none;
color:white;
font-size:18px;
text-align:left;
border-radius:999px;
cursor:pointer;
margin-bottom:10px;
}

.menu button:hover{
background:#111;
}

.feed{
border-right:1px solid #222;
}

.feed-top{
padding:20px;
border-bottom:1px solid #222;
}

.profile-box{
padding:20px;
border-bottom:1px solid #222;
display:flex;
gap:15px;
align-items:center;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
}

.create-post{
padding:20px;
border-bottom:1px solid #222;
}

.create-post textarea{
width:100%;
min-height:100px;
background:none;
border:none;
outline:none;
resize:none;
color:white;
font-size:20px;
}

.post-btn{
background:#1d9bf0;
border:none;
padding:12px 25px;
border-radius:999px;
color:white;
cursor:pointer;
margin-top:10px;
}

.post{
padding:20px;
border-bottom:1px solid #222;
}

.post:hover{
background:#080808;
}

.post-top{
display:flex;
gap:12px;
}

.username{
color:gray;
}

.post-text{
margin-top:10px;
line-height:1.5;
font-size:17px;
}

.actions{
display:flex;
justify-content:space-between;
max-width:400px;
margin-top:15px;
}

.actions button{
background:none;
border:none;
color:gray;
cursor:pointer;
}

.comments{
margin-top:15px;
padding-top:10px;
border-top:1px solid #222;
}

.comment{
padding:10px 0;
border-bottom:1px solid #111;
font-size:14px;
}

.comment-input{
display:flex;
gap:10px;
margin-top:10px;
}

.comment-input input{
flex:1;
padding:10px;
background:#111;
border:none;
border-radius:999px;
color:white;
}

.comment-input button{
background:#1d9bf0;
border:none;
padding:10px 15px;
border-radius:999px;
color:white;
cursor:pointer;
}

.sidebar-right{
padding:20px;
}

.box{
background:#16181c;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.user-card{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
}

.follow-btn{
background:white;
border:none;
padding:8px 16px;
border-radius:999px;
cursor:pointer;
font-weight:bold;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#111;
padding:30px;
border-radius:20px;
width:400px;
}

.modal-content input{
width:100%;
padding:12px;
margin-bottom:12px;
background:#222;
border:none;
border-radius:10px;
color:white;
}

.modal-content button{
width:100%;
padding:12px;
background:#1d9bf0;
border:none;
color:white;
border-radius:999px;
cursor:pointer;
margin-bottom:10px;
}

</style>
</head>
<body>

<div id="authModal" class="modal">

<div class="modal-content">

<h2 style="margin-bottom:20px;">
Entrar ou Criar Conta
</h2>

<input id="name" placeholder="Nome">

<input id="username" placeholder="@username">

<input id="password" type="password" placeholder="Senha">

<input id="avatarInput" placeholder="URL da foto">

<button onclick="register()">
Criar Conta
</button>

<button onclick="login()">
Entrar
</button>

</div>

</div>

<div class="app">

<aside class="sidebar-left">

<h1 class="logo">𝕏</h1>

<div class="menu">

<button>🏠 Home</button>
<button>🔍 Explorar</button>
<button>🔔 Notificações</button>
<button>✉️ Mensagens</button>

<button onclick="logout()">
🚪 Sair
</button>

</div>

</aside>

<main class="feed">

<div class="feed-top">
<h2>Página Inicial</h2>
</div>

<div class="profile-box">

<img
id="profileAvatar"
class="avatar"
src=""
>

<div>

<h2 id="profileName"></h2>

<div
id="profileUsername"
class="username"
></div>

<br>

<div id="profileStats"></div>

</div>

</div>

<div class="create-post">

<textarea
id="postText"
placeholder="O que está acontecendo?"
></textarea>

<button
class="post-btn"
onclick="createPost()"
>
Postar
</button>

</div>

<div id="feed"></div>

</main>

<aside class="sidebar-right">

<div class="box">

<h2>Tendências</h2>

<div>#OpenAI</div>
<div>#Tecnologia</div>
<div>#IA</div>
<div>#JavaScript</div>
<div>#Brasil</div>

</div>

<div class="box">

<h2>Quem seguir</h2>

<div id="usersList"></div>

</div>

</aside>

</div>

<script>

const API_URL =
'https://script.google.com/macros/s/AKfycbzauZmzc9FOlyrcRHARfaxyU0FBMTyDtROC078g8knIUvAVumJ1n-k1qYRgiVoBoeMy/exec';

let currentUser = null;

function saveUser(user){

localStorage.setItem(
'currentUser',
JSON.stringify(user)
);

currentUser = user;

document
.getElementById('authModal')
.style.display='none';

loadProfile();

loadFeed();

loadUsers();
}

function logout(){

localStorage.removeItem('currentUser');

location.reload();
}

function checkLogin(){

const saved =
localStorage.getItem('currentUser');

if(saved){

saveUser(JSON.parse(saved));
}
}

async function register(){

const name =
document.getElementById('name').value;

const username =
document.getElementById('username').value;

const password =
document.getElementById('password').value;

const avatar =
document.getElementById('avatarInput').value;

const res = await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
action:'register',
name,
username,
password,
avatar
})
});

const data = await res.json();

if(data.success){

saveUser(data.user);

}else{

alert(data.message);
}
}

async function login(){

const username =
document.getElementById('username').value;

const password =
document.getElementById('password').value;

const res = await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
action:'login',
username,
password
})
});

const data = await res.json();

if(data.success){

saveUser(data.user);

}else{

alert(data.message);
}
}

async function loadProfile(){

const res = await fetch(
API_URL +
'?action=getProfile&userId=' +
currentUser.id
);

const profile = await res.json();

document.getElementById(
'profileAvatar'
).src = profile.avatar;

document.getElementById(
'profileName'
).innerText = profile.name;

document.getElementById(
'profileUsername'
).innerText = profile.username;

document.getElementById(
'profileStats'
).innerHTML = `
<strong>${profile.followers}</strong> seguidores •
<strong>${profile.following}</strong> seguindo •
<strong>${profile.posts}</strong> posts
`;
}

async function createPost(){

const text =
document.getElementById('postText').value;

if(!text.trim()) return;

await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
action:'createPost',
userId:currentUser.id,
text
})
});

document.getElementById('postText').value='';

loadFeed();

loadProfile();
}

async function likePost(postId){

await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
action:'likePost',
postId,
userId:currentUser.id
})
});

loadFeed();
}

async function commentPost(postId){

const input =
document.getElementById(
'comment_'+postId
);

const text = input.value;

if(!text.trim()) return;

await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
action:'commentPost',
postId,
userId:currentUser.id,
text
})
});

input.value='';

loadFeed();
}

async function followUser(userId){

await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
action:'followUser',
followerId:currentUser.id,
followingId:userId
})
});

loadUsers();

loadProfile();
}

async function loadUsers(){

const res =
await fetch(API_URL+'?action=getUsers');

const data = await res.json();

const usersList =
document.getElementById('usersList');

usersList.innerHTML='';

data.users.forEach(user=>{

if(user.id !== currentUser.id){

usersList.innerHTML += `

<div class="user-card">

<div style="display:flex;gap:10px;">

<img
src="${user.avatar}"
style="
width:40px;
height:40px;
border-radius:50%;
"
>

<div>

<strong>${user.name}</strong>

<br>

<span class="username">
${user.username}
</span>

<br>

<small>
${user.followers} seguidores
</small>

</div>

</div>

<button
class="follow-btn"
onclick="followUser('${user.id}')"
>
Seguir
</button>

</div>

`;
}
});
}

async function loadFeed(){

const res =
await fetch(API_URL+'?action=getFeed');

const data = await res.json();

const feed =
document.getElementById('feed');

feed.innerHTML='';

data.posts.reverse().forEach(post=>{

let commentsHTML='';

post.commentsList.forEach(comment=>{

commentsHTML += `

<div class="comment">

<strong>${comment.name}</strong>

<span class="username">
${comment.username}
</span>

<br>

${comment.text}

</div>

`;

});

feed.innerHTML += `

<div class="post">

<div class="post-top">

<img
class="avatar"
src="${post.avatar}"
>

<div>

<strong>${post.name}</strong>

<br>

<span class="username">
${post.username}
</span>

</div>

</div>

<div class="post-text">
${post.text}
</div>

<div class="actions">

<button
onclick="likePost('${post.id}')"
>
❤️ ${post.likes}
</button>

<button>
💬 ${post.comments}
</button>

<button>
🔁 ${post.reposts}
</button>

</div>

<div class="comments">

${commentsHTML}

<div class="comment-input">

<input
id="comment_${post.id}"
placeholder="Comentar..."
>

<button
onclick="commentPost('${post.id}')"
>
Enviar
</button>

</div>

</div>

</div>

`;

});
}

checkLogin();

setInterval(loadFeed,4000);

</script>

</body>
</html>
