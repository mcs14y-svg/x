<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social X</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial,sans-serif;
}

.app{
max-width:1400px;
margin:auto;
display:grid;
grid-template-columns:260px 1fr 350px;
min-height:100vh;
}

.sidebar-left{
padding:20px;
border-right:1px solid #222;
position:sticky;
top:0;
height:100vh;
}

.logo{
font-size:42px;
margin-bottom:30px;
}

.menu button{
width:100%;
padding:16px;
background:none;
border:none;
color:white;
font-size:18px;
text-align:left;
border-radius:999px;
cursor:pointer;
margin-bottom:8px;
transition:0.2s;
</html>
