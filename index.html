<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social X</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

.app{
max-width:1400px;
margin:auto;
display:grid;
grid-template-columns:260px 1fr 350px;
min-height:100vh;
}

.sidebar-left{
padding:20px;
border-right:1px solid #222;
position:sticky;
top:0;
height:100vh;
}

.logo{
font-size:42px;
margin-bottom:30px;
}

.menu button{
width:100%;
padding:16px;
background:none;
border:none;
color:white;
font-size:18px;
text-align:left;
border-radius:999px;
cursor:pointer;
margin-bottom:8px;
transition:0.2s;
}

.menu button:hover{
background:#111;
}

.feed{
border-right:1px solid #222;
}

.feed-top{
padding:20px;
border-bottom:1px solid #222;
position:sticky;
top:0;
background:rgba(0,0,0,0.9);
backdrop-filter:blur(10px);
z-index:100;
}

.create-post{
padding:20px;
border-bottom:1px solid #222;
}

.create-post textarea{
width:100%;
min-height:120px;
background:none;
border:none;
outline:none;
resize:none;
color:white;
font-size:20px;
}

.post-btn{
background:#1d9bf0;
color:white;
border:none;
padding:12px 25px;
border-radius:999px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.post{
padding:20px;
border-bottom:1px solid #222;
transition:0.2s;
}

.post:hover{
background:#080808;
}

.post-top{
display:flex;
gap:12px;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
}

.user-data{
display:flex;
flex-direction:column;
}

.username{
color:gray;
}

.post-text{
margin-top:10px;
line-height:1.5;
font-size:17px;
white-space:pre-wrap;
}

.actions{
display:flex;
justify-content:space-between;
max-width:500px;
margin-top:15px;
}

.actions button{
background:none;
border:none;
color:gray;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

.actions button:hover{
color:#1d9bf0;
}

.comments{
margin-top:15px;
padding-top:10px;
border-top:1px solid #222;
}

.comment{
padding:10px 0;
font-size:14px;
color:#ddd;
border-bottom:1px solid #111;
}

.comment-input{
display:flex;
gap:10px;
margin-top:10px;
}

.comment-input input{
flex:1;
background:#111;
border:none;
padding:10px;
border-radius:999px;
color:white;
}

.comment-input button{
background:#1d9bf0;
border:none;
color:white;
padding:10px 16px;
border-radius:999px;
cursor:pointer;
}

.sidebar-right{
padding:20px;
}

.box{
background:#16181c;
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

.trend{
padding:15px 0;
border-bottom:1px solid #2f3336;
cursor:pointer;
}

.trend:last-child{
border-bottom:none;
}

.users-list{
display:flex;
flex-direction:column;
gap:15px;
margin-top:15px;
}

.user-card{
display:flex;
justify-content:space-between;
align-items:center;
}

.follow-btn{
background:white;
border:none;
padding:8px 16px;
border-radius:999px;
cursor:pointer;
font-weight:bold;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#111;
padding:30px;
border-radius:20px;
width:400px;
}

.modal-content input{
width:100%;
padding:12px;
margin-bottom:12px;
background:#222;
border:none;
border-radius:10px;
color:white;
}

.modal-content button{
width:100%;
padding:12px;
background:#1d9bf0;
border:none;
color:white;
border-radius:999px;
cursor:pointer;
}

.loading{
padding:30px;
text-align:center;
color:gray;
}

@media(max-width:1000px){

.app{
grid-template-columns:80px 1fr;
}

.sidebar-right{
display:none;
}

}

@media(max-width:700px){

.app{
grid-template-columns:1fr;
}

.sidebar-left{
display:none;
}

}

</style>
</head>
<body>

<div class="app">

<aside class="sidebar-left">

<h1 class="logo">𝕏</h1>

<div class="menu">
<button>🏠 Home</button>
<button>🔍 Explorar</button>
<button>🔔 Notificações</button>
<button>✉️ Mensagens</button>
<button onclick="openRegister()">➕ Novo usuário</button>
</div>

</aside>

<main class="feed">

<div class="feed-top">
<h2>Página Inicial</h2>
</div>

<div class="create-post">

<textarea id="postText" placeholder="O que está acontecendo?"></textarea>

<button class="post-btn" onclick="createPost()">
Postar
</button>

</div>

<div id="feed">
<div class="loading">Carregando feed...</div>
</div>

</main>

<aside class="sidebar-right">

<div class="box">
<h2>Tendências</h2>

<div id="trends"></div>

</div>

<div class="box">

<h2>Quem seguir</h2>

<div id="usersList" class="users-list"></div>

</div>

</aside>

</div>

<div class="modal" id="registerModal">

<div class="modal-content">

<h2 style="margin-bottom:20px;">Criar usuário</h2>

<input type="text" id="nameInput" placeholder="Nome">

<input type="text" id="usernameInput" placeholder="@username">

<input type="text" id="avatarInput" placeholder="URL da foto">

<button onclick="createUser()">
Criar Conta
</button>

</div>

</div>

<script>

const API_URL = 'https://script.google.com/macros/s/AKfycbxW48DoYrLudcEGUU7ASqXio7cMgzwt6cdbCvTg_Z2dJ-chNTwJJAEfBgb3ON3xTrry/exec';

let currentUser = {
id:'user_1',
name:'Murilo',
username:'@murilo',
avatar:'https://i.pravatar.cc/150?img=12'
};

function openRegister(){
document.getElementById('registerModal').style.display='flex';
}

window.onclick = (e)=>{
if(e.target.id === 'registerModal'){
document.getElementById('registerModal').style.display='none';
}
};

async function createUser(){

const name = document.getElementById('nameInput').value;
const username = document.getElementById('usernameInput').value;
const avatar = document.getElementById('avatarInput').value;

if(!name || !username){
alert('Preencha tudo');
return;
}

const res = await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
action:'createUser',
name,
username,
avatar
})
});

const data = await res.json();

currentUser = data.user;

document.getElementById('registerModal').style.display='none';

loadUsers();

alert('Usuário criado!');
}

async function createPost(){

const text = document.getElementById('postText').value;

if(!text.trim()){
alert('Digite algo');
return;
}

await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
action:'createPost',
userId:currentUser.id,
text:text
})
});

document.getElementById('postText').value='';

loadFeed();
loadTrends();
}

async function likePost(postId){

await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
action:'likePost',
postId,
userId:currentUser.id
})
});

loadFeed();
}

async function commentPost(postId){

const input = document.getElementById('comment_'+postId);

const text = input.value;

if(!text.trim()) return;

await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
action:'commentPost',
postId,
userId:currentUser.id,
text
})
});

input.value='';

loadFeed();
}

async function loadFeed(){

const res = await fetch(API_URL+'?action=getFeed');

const data = await res.json();

renderFeed(data.posts);
}

function renderFeed(posts){

const feed = document.getElementById('feed');

feed.innerHTML='';

posts.reverse().forEach(post=>{

let commentsHTML = '';

if(post.commentsList){

post.commentsList.forEach(comment=>{

commentsHTML += `
<div class="comment">
<strong>${comment.name}</strong>
<span style="color:gray">${comment.username}</span>
<br>
${comment.text}
</div>
`;

});

}

feed.innerHTML += `

<div class="post">

<div class="post-top">

<img class="avatar" src="${post.avatar}">

<div class="user-data">
<strong>${post.name}</strong>
<span class="username">${post.username}</span>
</div>

</div>

<div class="post-text">
${post.text}
</div>

<div class="actions">

<button onclick="likePost('${post.id}')">
❤️ ${post.likes}
</button>

<button>
💬 ${post.comments}
</button>

<button>
🔁 ${post.reposts}
</button>

<button>
👁️ ${Math.floor(Math.random()*1000)}
</button>

</div>

<div class="comments">

${commentsHTML}

<div class="comment-input">

<input
id="comment_${post.id}"
placeholder="Comentar..."
>

<button onclick="commentPost('${post.id}')">
Enviar
</button>

</div>

</div>

</div>

`;

});

}

async function loadUsers(){

const res = await fetch(API_URL+'?action=getUsers');

const data = await res.json();

const usersList = document.getElementById('usersList');

usersList.innerHTML='';

data.users.forEach(user=>{

usersList.innerHTML += `

<div class="user-card">

<div style="display:flex;gap:10px;align-items:center;">

<img
src="${user.avatar}"
style="width:40px;height:40px;border-radius:50%;"
>

<div>
<strong>${user.name}</strong>
<br>
<span style="color:gray">${user.username}</span>
</div>

</div>

<button class="follow-btn">
Seguir
</button>

</div>

`;

});

}

async function loadTrends(){

const trends = [
'#javascript',
'#html',
'#css',
'#nodejs',
'#games',
'#tecnologia',
'#brasil',
'#IA',
'#OpenAI',
'#frontend'
];

const trendsDiv = document.getElementById('trends');

trendsDiv.innerHTML='';

trends.sort(()=>Math.random()-0.5);

trends.slice(0,5).forEach(trend=>{

trendsDiv.innerHTML += `
<div class="trend">${trend}</div>
`;

});

}

loadFeed();
loadUsers();
loadTrends();

setInterval(loadFeed,5000);

</script>

</body>
</html>
